name: Required Merge Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
    branches:
      - main
      - 1.0.0
      - 0.1.x
      - develop
  push:
    branches:
      - main
      - 1.0.0
      - 0.1.x
      - develop
  merge_group:
    branches:
      - main
      - 1.0.0
      - 0.1.x
      - develop

permissions:
  contents: read
  checks: read

concurrency:
  group: required-merge-gate-${{ github.event_name != 'pull_request' && github.run_id || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  classify-changes:
    name: classify validation profile
    runs-on: ubuntu-24.04
    outputs:
      profile: ${{ steps.classify.outputs.profile }}
      release_policy_only: ${{ steps.classify.outputs.release_policy_only }}
      rpc_docs_only: ${{ steps.classify.outputs.rpc_docs_only }}
      public_docs_only: ${{ steps.classify.outputs.public_docs_only }}
      github_metadata_only: ${{ steps.classify.outputs.github_metadata_only }}
      source_validation_required: ${{ steps.classify.outputs.source_validation_required }}
      touched_operator_keys: ${{ steps.classify.outputs.touched_operator_keys }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Write changed file list
        id: changed-files
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          set -euo pipefail

          changed_files="${RUNNER_TEMP}/changed-files.txt"
          : > "${changed_files}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            if [[ -z "${BASE_SHA}" ]]; then
              echo "::error::Pull request base SHA is unavailable."
              exit 1
            fi
            git diff --name-only "${BASE_SHA}...HEAD" > "${changed_files}"
          elif [[ "${EVENT_NAME}" == "merge_group" ]]; then
            base_branch="${BASE_REF#refs/heads/}"
            if [[ -z "${base_branch}" ]]; then
              echo "::error::Merge-group base branch is unavailable."
              exit 1
            fi
            git fetch --no-tags --prune origin "+refs/heads/${base_branch}:refs/remotes/origin/${base_branch}"
            git diff --name-only "origin/${base_branch}...HEAD" > "${changed_files}"
          elif [[ "${EVENT_NAME}" == "push" ]]; then
            if [[ -n "${BEFORE_SHA}" && ! "${BEFORE_SHA}" =~ ^0+$ ]]; then
              git diff --name-only "${BEFORE_SHA}..HEAD" > "${changed_files}"
            else
              git fetch --no-tags --prune origin "${DEFAULT_BRANCH}"
              merge_base="$(git merge-base "origin/${DEFAULT_BRANCH}" HEAD 2>/dev/null || true)"
              if [[ -n "${merge_base}" ]]; then
                git diff --name-only "${merge_base}...HEAD" > "${changed_files}"
              else
                git diff-tree --no-commit-id --name-only -r HEAD > "${changed_files}"
              fi
            fi
          else
            git diff-tree --no-commit-id --name-only -r HEAD > "${changed_files}"
          fi

          cat "${changed_files}"
          echo "changed_files=${changed_files}" >> "$GITHUB_OUTPUT"

      - name: Classify validation profile
        id: classify
        run: |
          python3 ci/checks/classify_merge_profile.py \
            --changed-files "${{ steps.changed-files.outputs.changed_files }}" \
            --github-output "$GITHUB_OUTPUT"

  operator-key-policy-validation:
    name: operator-key policy validation
    needs: classify-changes
    if: ${{ always() && needs.classify-changes.result == 'success' && needs.classify-changes.outputs.touched_operator_keys == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install policy validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gpg

      - name: Validate current policy and transition approvals
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || '' }}
        run: |
          set -euo pipefail

          canonical_dir="contrib/keys/operator-keys"
          mirror_dir="contrib/guix/repo-templates/qbit-guix.sigs/operator-keys"
          validator_args=(
            --operator-policy "${canonical_dir}/keys.json"
            --operator-keys-dir "${canonical_dir}"
            --operator-policy-mirror "${mirror_dir}/keys.json"
            --operator-keys-dir-mirror "${mirror_dir}"
            --require-public-key-files
          )

          policy_sequence="$(
            jq -er '.policy_sequence | select(type == "number")' "${canonical_dir}/keys.json"
          )"
          if (( policy_sequence > 1 )); then
            previous_policy_sha256="$(
              jq -er '.previous_policy_sha256 | select(type == "string")' \
                "${canonical_dir}/keys.json"
            )"
            history_root=""
            if [[ "${EVENT_NAME}" == "pull_request" || "${EVENT_NAME}" == "merge_group" ]]; then
              history_root="${BASE_SHA}"
            elif [[ "${EVENT_NAME}" == "push" && -n "${BEFORE_SHA}" && ! "${BEFORE_SHA}" =~ ^0+$ ]]; then
              history_root="${BEFORE_SHA}"
            elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              history_root="$(git rev-parse HEAD^)"
            fi

            if [[ -z "${history_root}" ]]; then
              echo "::error::Unable to identify trusted history for previous operator policy discovery."
              exit 1
            fi

            previous_commit=""
            while IFS= read -r candidate_commit; do
              if ! git cat-file -e "${candidate_commit}:${canonical_dir}/keys.json" 2>/dev/null; then
                continue
              fi
              candidate_sha256="$(
                git show "${candidate_commit}:${canonical_dir}/keys.json" \
                  | sha256sum \
                  | cut -d ' ' -f 1
              )"
              if [[ "${candidate_sha256}" == "${previous_policy_sha256}" ]]; then
                previous_commit="${candidate_commit}"
                break
              fi
            done < <(git rev-list "${history_root}" -- "${canonical_dir}/keys.json")

            if [[ -z "${previous_commit}" ]]; then
              echo "::error::Previous operator policy ${previous_policy_sha256} is not present in trusted base history."
              exit 1
            fi

            previous_root="${RUNNER_TEMP}/previous-operator-policy"
            mkdir -p "${previous_root}"
            git archive "${previous_commit}" "${canonical_dir}" | tar -x -C "${previous_root}"
            validator_args+=(
              --previous-operator-policy "${previous_root}/${canonical_dir}/keys.json"
            )
          fi

          python3 ci/release/validate_key_metadata.py "${validator_args[@]}"

      - name: Validate exact operator-key mirror
        run: |
          set -euo pipefail
          PYTHONPATH=ci/release python3 - <<'PY'
          import json
          from pathlib import Path

          from validate_builder_attestations import load_builder_policy, validate_builder_mirror

          canonical_dir = Path("contrib/keys/operator-keys")
          mirror_dir = Path("contrib/guix/repo-templates/qbit-guix.sigs/operator-keys")
          release_lines = json.loads(
              (canonical_dir / "keys.json").read_text(encoding="utf8")
          )["release_lines"]

          for release_line in sorted(release_lines):
              policy = load_builder_policy(
                  canonical_dir / "keys.json",
                  canonical_dir,
                  release_line,
              )
              validate_builder_mirror(
                  policy,
                  canonical_dir,
                  mirror_dir / "keys.json",
                  mirror_dir,
                  release_line,
              )
              print(f"Exact operator-key mirror validated for {release_line}")
          PY

  release-policy-validation:
    name: release-policy validation
    needs: classify-changes
    if: ${{ always() && needs.classify-changes.result == 'success' && needs.classify-changes.outputs.release_policy_only == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Write changed file list
        id: changed-files
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          set -euo pipefail

          changed_files="${RUNNER_TEMP}/changed-files.txt"
          diff_range=""
          : > "${changed_files}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            if [[ -z "${BASE_SHA}" ]]; then
              echo "::error::Pull request base SHA is unavailable."
              exit 1
            fi
            diff_range="${BASE_SHA}...HEAD"
            git diff --name-only "${diff_range}" > "${changed_files}"
          elif [[ "${EVENT_NAME}" == "merge_group" ]]; then
            base_branch="${BASE_REF#refs/heads/}"
            if [[ -z "${base_branch}" ]]; then
              echo "::error::Merge-group base branch is unavailable."
              exit 1
            fi
            git fetch --no-tags --prune origin "+refs/heads/${base_branch}:refs/remotes/origin/${base_branch}"
            diff_range="origin/${base_branch}...HEAD"
            git diff --name-only "${diff_range}" > "${changed_files}"
          elif [[ "${EVENT_NAME}" == "push" ]]; then
            if [[ -n "${BEFORE_SHA}" && ! "${BEFORE_SHA}" =~ ^0+$ ]]; then
              diff_range="${BEFORE_SHA}..HEAD"
              git diff --name-only "${diff_range}" > "${changed_files}"
            else
              git fetch --no-tags --prune origin "${DEFAULT_BRANCH}"
              merge_base="$(git merge-base "origin/${DEFAULT_BRANCH}" HEAD 2>/dev/null || true)"
              if [[ -n "${merge_base}" ]]; then
                diff_range="${merge_base}...HEAD"
                git diff --name-only "${diff_range}" > "${changed_files}"
              else
                git diff-tree --no-commit-id --name-only -r HEAD > "${changed_files}"
              fi
            fi
          else
            git diff-tree --no-commit-id --name-only -r HEAD > "${changed_files}"
          fi

          cat "${changed_files}"
          echo "changed_files=${changed_files}" >> "$GITHUB_OUTPUT"
          echo "diff_range=${diff_range}" >> "$GITHUB_OUTPUT"

      - name: Confirm release-policy-only profile
        id: classify
        run: |
          python3 ci/checks/classify_merge_profile.py \
            --changed-files "${{ steps.changed-files.outputs.changed_files }}" \
            --github-output "$GITHUB_OUTPUT" \
            --require-release-policy-only

      - name: Check whitespace in changed files
        env:
          DIFF_RANGE: ${{ steps.changed-files.outputs.diff_range }}
        run: |
          set -euo pipefail

          if [[ -n "${DIFF_RANGE}" ]]; then
            git diff --check "${DIFF_RANGE}"
          else
            git diff-tree --check --root HEAD
          fi

      - name: Check release publisher syntax
        if: steps.classify.outputs.touched_release_publish == 'true'
        run: |
          set -euo pipefail
          bash -n contrib/release-process/publish-local-release.sh

      - name: Run release validator tests
        if: steps.classify.outputs.touched_release_publish == 'true' || steps.classify.outputs.touched_release_validators == 'true'
        run: |
          set -euo pipefail

          tests=(
            ci.release.test_publish_local_release
            ci.release.test_validate_builder_attestations
            ci.release.test_validate_key_metadata
            ci.release.test_validate_release_artifacts
            ci.release.test_verify_mainnet_ci_posture
            ci.release.test_verify_mainnet_release_posture
            ci.release.test_verify_p2mr_v1_conformance
          )
          if [[ -f ci/release/test_verify_testnet_release_posture.py ]]; then
            tests+=(ci.release.test_verify_testnet_release_posture)
          fi
          python3 -m unittest "${tests[@]}"

      - name: Validate operator key metadata
        if: steps.classify.outputs.touched_operator_keys == 'true'
        run: |
          python3 ci/release/validate_key_metadata.py \
            --operator-policy contrib/keys/operator-keys/keys.json \
            --operator-keys-dir contrib/keys/operator-keys \
            --require-public-key-files \
            --skip-policy-transition-validation

  rpc-docs-validation:
    name: rpc-docs validation
    needs: classify-changes
    if: ${{ always() && needs.classify-changes.result == 'success' && needs.classify-changes.outputs.profile == 'rpc-docs' }}
